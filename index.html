<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOB FIT 16 · 직무 강점 유형 검사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --mid: #4a4a6a;
    --soft: #9898b8;
    --bg: #f7f6f2;
    --card: #ffffff;
    --accent: #5b5fc7;
    --accent-light: #eeeeff;
    --accent-glow: rgba(91,95,199,0.15);
    --success: #2eb87e;
    --radius: 18px;
    --shadow: 0 4px 32px rgba(26,26,46,0.10);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
  }

  /* ─── SCREENS ──────────────────────────────── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }

  /* ─── INTRO ────────────────────────────────── */
  #intro {
    background: linear-gradient(145deg, #1a1a2e 0%, #2e2e5e 60%, #3a3a7e 100%);
    color: #fff;
    text-align: center;
    gap: 0;
  }

  .intro-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 28px;
  }

  .intro-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(48px, 10vw, 80px);
    line-height: 1.0;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, #a0a4f8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .intro-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    margin-bottom: 36px;
  }

  .intro-desc {
    max-width: 360px;
    font-size: 15px;
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
    margin-bottom: 48px;
  }

  .intro-meta {
    display: flex;
    gap: 28px;
    justify-content: center;
    margin-bottom: 52px;
  }

  .intro-meta-item {
    text-align: center;
  }

  .intro-meta-item .val {
    display: block;
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: #fff;
  }

  .intro-meta-item .lbl {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .btn-start {
    background: #fff;
    color: var(--accent);
    border: none;
    padding: 16px 52px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
  .btn-start:active { transform: translateY(0); }

  /* ─── QUESTION ──────────────────────────────── */
  #question { background: var(--bg); gap: 0; }

  .q-header {
    width: 100%;
    max-width: 540px;
    margin-bottom: 32px;
  }

  .q-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .q-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .q-count {
    font-size: 12px;
    color: var(--soft);
  }

  .progress-bar {
    height: 4px;
    background: #e0e0f0;
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #8b8ff0);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .q-section-label {
    font-size: 11px;
    color: var(--soft);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 14px;
    font-weight: 500;
  }

  .q-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 540px;
    animation: slideIn 0.3s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-text {
    font-size: 19px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 32px;
    min-height: 56px;
  }

  .q-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .q-option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 20px;
    border: 2px solid #e8e8f4;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.18s;
    background: #fafaff;
    text-align: left;
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .q-option:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .q-option.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .opt-badge {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #ebebf8;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s, color 0.18s;
  }

  .q-option.selected .opt-badge,
  .q-option:hover .opt-badge {
    background: var(--accent);
    color: #fff;
  }

  .opt-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--mid);
    padding-top: 4px;
  }

  .q-option.selected .opt-text {
    color: var(--ink);
    font-weight: 500;
  }

  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 540px;
    margin-top: 24px;
  }

  .btn-nav {
    background: none;
    border: 2px solid #e0e0f0;
    padding: 12px 28px;
    border-radius: 100px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-next {
    background: var(--accent);
    border: none;
    padding: 14px 36px;
    border-radius: 100px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
  }

  .btn-next.visible {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
  }

  .btn-next:hover { background: #4a4fb8; }

  /* ─── RESULT ─────────────────────────────── */
  #result { background: var(--bg); padding: 40px 20px 60px; }

  .result-wrap {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .result-hero {
    background: linear-gradient(145deg, #1a1a2e, #2e2e5e);
    border-radius: var(--radius);
    padding: 40px 32px;
    color: #fff;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(91,95,199,0.25);
    top: -80px; right: -80px;
  }

  .result-badge-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .result-type-code {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    background: linear-gradient(135deg, #fff 30%, #a0a4f8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .result-type-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }

  .result-type-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    line-height: 1.8;
    max-width: 380px;
    margin: 0 auto;
  }

  .result-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 28px;
    box-shadow: var(--shadow);
  }

  .result-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .kw {
    background: var(--accent-light);
    color: var(--accent);
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
  }

  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .phrase-item {
    background: #f7f6f2;
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    border-left: 3px solid var(--accent);
  }

  .phrase-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .phrase-text {
    font-size: 14px;
    line-height: 1.85;
    color: var(--mid);
    word-break: keep-all;
  }

  .phrase-copy-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--accent-light);
    border: none;
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .phrase-copy-btn:hover { background: #dddeff; }
  .phrase-copy-btn.copied { background: #d4f5e7; color: #1a8a5a; }

  .btn-retry {
    background: var(--accent);
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    width: 100%;
    transition: all 0.15s;
  }

  .btn-retry:hover { background: #4a4fb8; }

  /* ─── MOBILE ─────────────────────────────── */
  @media (max-width: 480px) {
    .q-card { padding: 28px 22px 24px; }
    .q-text { font-size: 17px; }
    .result-type-code { font-size: 40px; }
    .phrase-copy-btn { position: static; margin-top: 10px; }
    .phrase-item { padding-bottom: 14px; }
  }
</style>
</head>
<body>

<!-- ══ INTRO ══════════════════════════════════ -->
<div id="intro" class="screen active">
  <p class="intro-badge">직무 강점 유형 검사</p>
  <h1 class="intro-title">JOB FIT<br>16</h1>
  <p class="intro-sub">나에게 맞는 일의 방식을 찾다</p>
  <p class="intro-desc">16개 문항을 통해 나만의 직무 강점 유형을 발견하세요. 각 문항에서 평소 모습에 더 가까운 쪽을 선택하면 됩니다.</p>
  <div class="intro-meta">
    <div class="intro-meta-item"><span class="val">16</span><span class="lbl">문항</span></div>
    <div class="intro-meta-item"><span class="val">5분</span><span class="lbl">소요 시간</span></div>
    <div class="intro-meta-item"><span class="val">8가지</span><span class="lbl">유형</span></div>
  </div>
  <button class="btn-start" onclick="startTest()">검사 시작하기</button>
</div>

<!-- ══ QUESTION ════════════════════════════════ -->
<div id="question" class="screen">
  <div class="q-header">
    <div class="q-progress-row">
      <span class="q-num" id="qNum">문항 1</span>
      <span class="q-count" id="qCount">1 / 16</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <p class="q-section-label" id="qSection"></p>
  </div>
  <div class="q-card">
    <p class="q-text" id="qText"></p>
    <div class="q-options">
      <button class="q-option" id="optA" onclick="select('A')">
        <div class="opt-badge">A</div>
        <div class="opt-text" id="optAText"></div>
      </button>
      <button class="q-option" id="optB" onclick="select('B')">
        <div class="opt-badge">B</div>
        <div class="opt-text" id="optBText"></div>
      </button>
    </div>
  </div>
  <div class="q-nav">
    <button class="btn-nav" id="btnPrev" onclick="prev()">← 이전</button>
    <button class="btn-next" id="btnNext" onclick="next()">다음 →</button>
  </div>
</div>

<!-- ══ RESULT ══════════════════════════════════ -->
<div id="result" class="screen">
  <div class="result-wrap">
    <div class="result-hero">
      <p class="result-badge-label">나의 직무 강점 유형</p>
      <div class="result-type-code" id="resCode"></div>
      <div class="result-type-name" id="resName"></div>
      <p class="result-type-desc" id="resDesc"></p>
    </div>

    <div class="result-section">
      <p class="result-section-title">강점 키워드</p>
      <div class="keywords" id="resKeywords"></div>
    </div>

    <div class="result-section">
      <p class="result-section-title">자기소개서 활용 문구</p>
      <div class="phrase-list" id="resPhrases"></div>
    </div>

    <button class="btn-retry" onclick="restart()">다시 검사하기</button>
  </div>
</div>

<script>
const SECTIONS = ['①', '①', '①', '①', '②', '②', '②', '②', '③', '③', '③', '③', '④', '④', '④', '④'];
const SECTION_NAMES = [
  '새로운 일을 시작할 때',
  '새로운 일을 시작할 때',
  '새로운 일을 시작할 때',
  '새로운 일을 시작할 때',
  '학교생활과 팀 활동',
  '학교생활과 팀 활동',
  '학교생활과 팀 활동',
  '학교생활과 팀 활동',
  '일하는 모습',
  '일하는 모습',
  '일하는 모습',
  '일하는 모습',
  '나의 강점',
  '나의 강점',
  '나의 강점',
  '나의 강점',
];

const QUESTIONS = [
  { q: '새로운 일을 시작할 때 나는', a: '일단 해보면서 배운다.', b: '방법을 먼저 알아보고 시작한다.' },
  { q: '친구들과 활동할 때', a: '먼저 말을 걸고 분위기를 만든다.', b: '친한 친구들과 조용히 어울린다.' },
  { q: '과제를 할 때', a: '아이디어를 내는 것이 재미있다.', b: '계획대로 차근차근 하는 것이 좋다.' },
  { q: '문제가 생기면', a: '사람들과 이야기하며 해결한다.', b: '혼자 생각하며 해결책을 찾는다.' },
  { q: '조별 과제를 하면', a: '발표나 진행을 맡는다.', b: '자료 정리나 준비를 맡는다.' },
  { q: '친구가 고민을 말하면', a: '공감하고 위로해 준다.', b: '해결 방법을 알려준다.' },
  { q: '일을 할 때', a: '새로운 방법을 시도하는 편이다.', b: '익숙한 방법이 편하다.' },
  { q: '약속이나 일정은', a: '상황에 따라 바뀌어도 괜찮다.', b: '정해진 계획대로 움직이는 것이 좋다.' },
  { q: '칭찬받을 때 기분 좋은 것은', a: '"아이디어가 좋다."', b: '"꼼꼼하게 잘했다."' },
  { q: '나는', a: '사람들과 함께 일하는 것이 좋다.', b: '혼자 집중하는 시간이 필요하다.' },
  { q: '일을 맡으면', a: '여러 가지를 동시에 한다.', b: '하나씩 끝내면서 진행한다.' },
  { q: '새로운 환경에 가면', a: '금방 적응한다.', b: '천천히 익숙해진다.' },
  { q: '친구들이 나를 보면', a: '활발하다.', b: '차분하다.' },
  { q: '나는', a: '사람의 마음을 잘 살핀다.', b: '원리와 방법을 잘 따진다.' },
  { q: '해야 할 일이 생기면', a: '유연하게 대응한다.', b: '계획을 세우고 실천한다.' },
  { q: '내가 더 자신 있는 것은', a: '새로운 아이디어를 떠올리는 것', b: '꼼꼼하게 완성하는 것' },
];

// 영역: 문항 인덱스(0-based) → 영역 이름
// 2·4·10·13 → E/I  (indices 1,3,9,12)
// 3·7·9·16  → C/P  (indices 2,6,8,15)
// 6·14      → H/A  (indices 5,13)
// 1·8·11·15 → F/S  (indices 0,7,10,14)

const DOMAINS = [
  { name: 'E/I', label: '활력형 vs 집중형', indices: [1,3,9,12], aLabel: '활력형(E)', bLabel: '집중형(I)' },
  { name: 'C/P', label: '창의형 vs 실무형', indices: [2,6,8,15], aLabel: '창의형(C)', bLabel: '실무형(P)' },
  { name: 'H/A', label: '공감형 vs 분석형', indices: [5,13],     aLabel: '공감형(H)', bLabel: '분석형(A)' },
  { name: 'F/S', label: '도전형 vs 계획형', indices: [0,7,10,14], aLabel: '도전형(F)', bLabel: '계획형(S)' },
];

const TYPES = {
  'ECHF': {
    name: '소통 리더형', desc: '사람들과 잘 어울리고 새로운 일을 주도하는 유형',
    keywords: ['친화력','리더십','적극성','자신감','발표력','도전정신','적응력'],
    phrases: [

// Fallback: pick closest type
function closestType(code) {
  if (TYPES[code]) return code;
  // Try all combos
  const all = Object.keys(TYPES);
  let best = all[0], bestScore = -1;
  for (const key of all) {
    let score = 0;
    for (let i = 0; i < 4; i++) if (key[i] === code[i]) score++;
    if (score > bestScore) { bestScore = score; best = key; }
  }
  return best;
}

let current = 0;
let answers = new Array(16).fill(null);

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startTest() { current = 0; answers.fill(null); renderQ(); show('question'); }
function restart() { startTest(); }

function renderQ() {
  const q = QUESTIONS[current];
  document.getElementById('qNum').textContent = `문항 ${current+1}`;
  document.getElementById('qCount').textContent = `${current+1} / 16`;
  document.getElementById('progressFill').style.width = `${(current/16)*100}%`;
  document.getElementById('qSection').textContent = SECTION_NAMES[current];
  document.getElementById('qText').textContent = q.q;
  document.getElementById('optAText').textContent = q.a;
  document.getElementById('optBText').textContent = q.b;

  document.getElementById('optA').classList.remove('selected');
  document.getElementById('optB').classList.remove('selected');

  if (answers[current] === 'A') document.getElementById('optA').classList.add('selected');
  if (answers[current] === 'B') document.getElementById('optB').classList.add('selected');

  const next = document.getElementById('btnNext');
  if (answers[current]) next.classList.add('visible');
  else next.classList.remove('visible');

  document.getElementById('btnPrev').disabled = current === 0;
  next.textContent = current === 15 ? '결과 보기 ✦' : '다음 →';
}

function select(val) {
  answers[current] = val;
  document.getElementById('optA').classList.toggle('selected', val === 'A');
  document.getElementById('optB').classList.toggle('selected', val === 'B');
  document.getElementById('btnNext').classList.add('visible');

  // Auto-advance after short delay
  setTimeout(() => { if (answers[current]) next(); }, 350);
}

function next() {
  if (!answers[current]) return;
  if (current < 15) { current++; renderQ(); }
  else showResult();
}

function prev() {
  if (current > 0) { current--; renderQ(); }
}

function showResult() {
  // Calculate each domain
  const domainResults = DOMAINS.map(d => {
    let aCount = 0, bCount = 0;
    for (const i of d.indices) {
      if (answers[i] === 'A') aCount++;
      else if (answers[i] === 'B') bCount++;
    }
    return { ...d, aCount, bCount, winner: aCount >= bCount ? 'A' : 'B' };
  });

  // Build code: E/I → E or I, C/P → C or P, H/A → H or A, F/S → F or S
  const letters = [
    domainResults[0].winner === 'A' ? 'E' : 'I',
    domainResults[1].winner === 'A' ? 'C' : 'P',
    domainResults[2].winner === 'A' ? 'H' : 'A',
    domainResults[3].winner === 'A' ? 'F' : 'S',
  ];
  const code = letters.join('');
  const key = closestType(code);
  const type = TYPES[key];

  document.getElementById('resCode').textContent = key;
  document.getElementById('resName').textContent = type.name;
  document.getElementById('resDesc').textContent = type.desc;

  const kwEl = document.getElementById('resKeywords');
  kwEl.innerHTML = type.keywords.map(k => `<span class="kw">${k}</span>`).join('');

  const phEl = document.getElementById('resPhrases');
  phEl.innerHTML = type.phrases.map((p, i) => `
    <div class="phrase-item">
      <div class="phrase-num">문구 ${i + 1}</div>
      <p class="phrase-text">${p}</p>
      <button class="phrase-copy-btn" onclick="copyPhrase(this, \`${p.replace(/`/g, '\\`')}\`)">복사</button>
    </div>`).join('');

  show('result');
}

function copyPhrase(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
  });
}
